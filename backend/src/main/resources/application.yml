server:
  port: ${PORT:8080}
  base-url: ${SERVER_BASE_URL:http://localhost:8080}

spring:
  application:
    name: ai-call-screener
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/

# Twilio
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}

# User config
user:
  real-phone: ${USER_REAL_PHONE:}
  name: ${USER_NAME:Sai Teja Ragula}

# AI Services
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}

deepgram:
  api-key: ${DEEPGRAM_API_KEY:}
  model: nova-3

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY:}
  voice-id: ${ELEVENLABS_VOICE_ID:21m00Tcm4TlvDq8ikWAM}

# Web search for real-time technical answers (Brave Search API)
brave:
  search:
    api-key: ${BRAVE_SEARCH_API_KEY:}

# Call recordings saved to local disk
recordings:
  dir: ${RECORDINGS_DIR:./recordings}

# Self-training: ingest call transcripts into Pinecone RAG after each call
self:
  training:
    enabled: ${SELF_TRAINING_ENABLED:true}
    ingest-url: ${SELF_TRAINING_INGEST_URL:http://localhost:3000/api/ingest}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.callscreen: DEBUG
    org.springframework.web.socket: DEBUG
