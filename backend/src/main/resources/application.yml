server:
  port: ${PORT:8080}
  base-url: ${SERVER_BASE_URL:http://localhost:8080}
  tomcat:
    max-http-form-post-size: 10MB
    connection-timeout: 20000
    max-connections: 500
    threads:
      max: 200
      min-spare: 20

spring:
  application:
    name: ai-call-screener
  # BUG FIX: Spring Boot auto-configures Redis and will fail startup if the server
  # is unreachable. Since Redis is not required for core call functionality,
  # disable auto-configuration so the app starts without it.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/

# Twilio
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}

# User config
user:
  real-phone: ${USER_REAL_PHONE:}
  name: ${USER_NAME:AI Assistant}

# AI Services
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}

deepgram:
  api-key: ${DEEPGRAM_API_KEY:}
  model: nova-3

elevenlabs:
  api-key: ${ELEVENLABS_API_KEY:}
  voice-id: ${ELEVENLABS_VOICE_ID:21m00Tcm4TlvDq8ikWAM}

# Web search for real-time technical answers (Brave Search API)
brave:
  search:
    api-key: ${BRAVE_SEARCH_API_KEY:}

# Call recordings — stored in Google Cloud Storage (48-hour lifecycle)
gcs:
  bucket: ${GCS_BUCKET:callscreen-recordings-166891801449}

# Self-training: ingest call transcripts into Pinecone RAG after each call
self:
  training:
    enabled: ${SELF_TRAINING_ENABLED:true}
    ingest-url: ${SELF_TRAINING_INGEST_URL:http://localhost:3000/api/ingest}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.callscreen: INFO
    # BUG FIX: Spring WebSocket at DEBUG level logs every binary audio frame (~100/sec),
    # making logs unreadable and filling disk rapidly during live calls. Use WARN in prod.
    org.springframework.web.socket: WARN
